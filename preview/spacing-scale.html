<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--bg-page);color:var(--fg-primary);font-family:var(--font-sans)} .row{display:flex;align-items:center;gap:14px;padding:6px 0;border-bottom:1px solid var(--border-subtle)} .row:last-child{border:none} .bar{background:var(--trail-clay);height:20px;border:1px solid var(--earth-bark)} .tok{font-family:var(--font-code);font-size:11px;color:var(--fg-muted);min-width:70px} .lab{font-size:13px;font-weight:600;min-width:60px}</style>
</head><body>
<div class="row"><span class="tok">--space-1</span><span class="lab">4</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="tok">--space-2</span><span class="lab">8</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="tok">--space-3</span><span class="lab">12</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="tok">--space-4</span><span class="lab">16</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="tok">--space-5</span><span class="lab">20</span><div class="bar" style="width:20px"></div></div>
<div class="row"><span class="tok">--space-6</span><span class="lab">24</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="tok">--space-8</span><span class="lab">32</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="tok">--space-10</span><span class="lab">40</span><div class="bar" style="width:40px"></div></div>
<div class="row"><span class="tok">--space-12</span><span class="lab">48</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="tok">--space-16</span><span class="lab">64</span><div class="bar" style="width:64px"></div></div>
<div class="row"><span class="tok">--space-20</span><span class="lab">80</span><div class="bar" style="width:80px"></div></div>
</body></html>
