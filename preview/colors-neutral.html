<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-primary)}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
.chip{height:60px}
.meta{padding:6px 8px;background:var(--paper-pure);border-top:1px solid var(--border-subtle)}
.name{font-weight:600;font-size:12px}
.hex{font-family:var(--font-code);font-size:10px;color:var(--fg-muted);margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--earth-soil)"></div><div class="meta"><div class="name">earth-soil</div><div class="hex">#2D1F12</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--earth-bark)"></div><div class="meta"><div class="name">earth-bark</div><div class="hex">#4A3426</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--earth-stone)"></div><div class="meta"><div class="name">earth-stone</div><div class="hex">#6B5D52</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--earth-tan)"></div><div class="meta"><div class="name">earth-tan</div><div class="hex">#C9B89A</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--earth-dune)"></div><div class="meta"><div class="name">earth-dune</div><div class="hex">#E8DCC8</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--earth-sand)"></div><div class="meta"><div class="name">earth-sand</div><div class="hex">#F5F1E8</div></div></div>
</div>
</body></html>
