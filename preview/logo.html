<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-page);display:flex;gap:28px;align-items:center;font-family:var(--font-sans);color:var(--fg-primary)}
.mark{width:120px;height:120px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--paper-pure);display:flex;align-items:center;justify-content:center}
.mark img{width:88px;height:88px;object-fit:contain}
.wordmark{font-family:var(--font-display);font-size:56px;letter-spacing:2px;color:var(--fg-primary);line-height:1}
.note{font-size:12px;color:var(--fg-muted);font-family:var(--font-code);margin-top:6px}
</style></head><body>
<div class="mark"><img src="../assets/logo-app-icon.png" alt="Trail Peak mark"></div>
<div>
  <div class="wordmark">Trail Peak</div>
  <div class="note">mark · triangular monogram · min 48px</div>
</div>
</body></html>
