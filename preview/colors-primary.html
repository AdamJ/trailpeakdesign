<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-primary)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);box-shadow:4px 4px 0 0 var(--shadow-card)}
.chip{height:72px}
.meta{padding:8px 10px;background:var(--paper-pure);border-top:1px solid var(--border-subtle)}
.name{font-weight:600;font-size:13px;color:var(--fg-primary)}
.hex{font-family:var(--font-code);font-size:11px;color:var(--fg-muted);margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--trail-clay)"></div><div class="meta"><div class="name">trail-clay</div><div class="hex">#D35F3D</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--trail-ember)"></div><div class="meta"><div class="name">trail-ember</div><div class="hex">#B34A2D</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--trail-moss)"></div><div class="meta"><div class="name">trail-moss</div><div class="hex">#5A6B4F</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--trail-sage)"></div><div class="meta"><div class="name">trail-sage</div><div class="hex">#86A994</div></div></div>
</div>
</body></html>
