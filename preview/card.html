<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-primary)}
.card{width:380px;background:var(--earth-sand);border:1px solid var(--earth-bark);border-radius:20px;box-shadow:8px 8px 0 0 var(--shadow-deep);padding:22px;display:flex;flex-direction:column;gap:10px}
.card .ph{height:120px;background:repeating-linear-gradient(135deg,var(--earth-dune) 0 10px,var(--earth-tan) 10px 20px);border:1px dashed var(--earth-bark);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--fg-muted);font-family:var(--font-code);font-size:11px}
.card h3{margin:0;font-family:var(--font-serif);font-size:24px}
.card p{margin:0;font-size:14px;color:var(--fg-secondary)}
.card .foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.card .meta{font-family:var(--font-code);font-size:11px;color:var(--fg-muted)}
.card .link{font-weight:700;color:var(--trail-moss);text-decoration:underline;font-size:14px}
</style></head><body>
<div class="card">
  <div class="ph">image placeholder</div>
  <h3>Time Tracker Pro</h3>
  <p>Native iOS time tracking for small teams, shipped in the winter of '25.</p>
  <div class="foot"><span class="meta">Case study · 8 min</span><a class="link">Read →</a></div>
</div>
</body></html>
