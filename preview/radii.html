<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-primary)}
.grid{display:flex;gap:20px;flex-wrap:wrap}
.cell{text-align:center}
.box{width:72px;height:72px;background:var(--earth-dune);border:1px solid var(--earth-bark)}
.tok{font-family:var(--font-code);font-size:11px;color:var(--fg-muted);margin-top:8px;letter-spacing:.02em}
.name{font-size:12px;font-weight:600;color:var(--fg-primary);margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="name">xs</div><div class="tok">4px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="tok">8px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md</div><div class="tok">12px · buttons</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg</div><div class="tok">16px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl</div><div class="tok">20px · cards</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="name">pill</div><div class="tok">100% · badges</div></div>
</div>
</body></html>
