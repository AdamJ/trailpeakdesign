<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-primary)}
table{width:100%;border-collapse:collapse}
td{padding:10px 12px;border-bottom:1px solid var(--border-subtle);vertical-align:middle}
.tok{font-family:var(--font-code);font-size:12px;color:var(--fg-secondary)}
.dot{width:22px;height:22px;border-radius:var(--radius-sm);border:1px solid var(--border);display:inline-block;vertical-align:middle;margin-right:10px}
.name{font-weight:600;font-size:13px}
</style></head><body>
<table>
<tr><td><span class="dot" style="background:var(--fg-primary)"></span><span class="name">--fg-primary</span></td><td class="tok">earth-soil · primary text</td></tr>
<tr><td><span class="dot" style="background:var(--fg-secondary)"></span><span class="name">--fg-secondary</span></td><td class="tok">earth-bark · secondary text</td></tr>
<tr><td><span class="dot" style="background:var(--fg-muted)"></span><span class="name">--fg-muted</span></td><td class="tok">earth-stone · muted text</td></tr>
<tr><td><span class="dot" style="background:var(--bg-page)"></span><span class="name">--bg-page</span></td><td class="tok">earth-sand · page</td></tr>
<tr><td><span class="dot" style="background:var(--bg-secondary)"></span><span class="name">--bg-secondary</span></td><td class="tok">earth-dune · raised</td></tr>
<tr><td><span class="dot" style="background:var(--accent)"></span><span class="name">--accent</span></td><td class="tok">trail-clay · links, hover</td></tr>
<tr><td><span class="dot" style="background:var(--accent-strong)"></span><span class="name">--accent-strong</span></td><td class="tok">trail-ember · primary btn</td></tr>
<tr><td><span class="dot" style="background:var(--accent-alt)"></span><span class="name">--accent-alt</span></td><td class="tok">trail-moss · secondary accent</td></tr>
</table>
</body></html>
