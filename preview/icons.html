<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>body{margin:0;padding:24px;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-primary)}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:16px;text-align:center}
.cell i{font-size:28px;color:var(--earth-soil)}
.cell .n{font-family:var(--font-code);font-size:10px;color:var(--fg-muted);margin-top:4px}
h5{margin:4px 0 8px;font-size:12px;color:var(--fg-muted);font-family:var(--font-code);font-weight:400}
</style></head><body>
<h5>Phosphor · Regular (reading / UI)</h5>
<div class="grid">
  <div class="cell"><i class="ph ph-tent"></i><div class="n">tent</div></div>
  <div class="cell"><i class="ph ph-compass"></i><div class="n">compass</div></div>
  <div class="cell"><i class="ph ph-map-trifold"></i><div class="n">map</div></div>
  <div class="cell"><i class="ph ph-fire"></i><div class="n">fire</div></div>
  <div class="cell"><i class="ph ph-user"></i><div class="n">user</div></div>
  <div class="cell"><i class="ph ph-arrow-up"></i><div class="n">arrow-up</div></div>
  <div class="cell"><i class="ph ph-mountains"></i><div class="n">mountains</div></div>
  <div class="cell"><i class="ph ph-path"></i><div class="n">path</div></div>
</div>
<h5 style="margin-top:16px">Phosphor · Fill (emphasis)</h5>
<div class="grid">
  <div class="cell"><i class="ph-fill ph-tent"></i><div class="n">tent</div></div>
  <div class="cell"><i class="ph-fill ph-compass"></i><div class="n">compass</div></div>
  <div class="cell"><i class="ph-fill ph-map-trifold"></i><div class="n">map</div></div>
  <div class="cell"><i class="ph-fill ph-fire"></i><div class="n">fire</div></div>
  <div class="cell"><i class="ph-fill ph-user"></i><div class="n">user</div></div>
  <div class="cell"><i class="ph-fill ph-arrow-up"></i><div class="n">arrow-up</div></div>
  <div class="cell"><i class="ph-fill ph-mountains"></i><div class="n">mountains</div></div>
  <div class="cell"><i class="ph-fill ph-leaf"></i><div class="n">leaf</div></div>
</div>
</body></html>
