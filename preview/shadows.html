<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-primary)} .grid{display:flex;gap:32px;flex-wrap:wrap} .cell{text-align:center} .box{width:100px;height:72px;background:var(--earth-sand);border:1px solid var(--earth-bark);border-radius:12px} .tok{font-family:var(--font-code);font-size:11px;color:var(--fg-muted);margin-top:12px}</style>
</head><body>
<div class="grid">
  <div class="cell"><div class="box" style="box-shadow:2px 2px 0 0 var(--earth-bark)"></div><div class="tok">press · 2 0 0</div></div>
  <div class="cell"><div class="box" style="box-shadow:4px 4px 0 0 var(--earth-bark)"></div><div class="tok">rest-sm · 4 0 0</div></div>
  <div class="cell"><div class="box" style="box-shadow:8px 8px 0 0 var(--shadow-card)"></div><div class="tok">rest-card · 8 0 0</div></div>
  <div class="cell"><div class="box" style="box-shadow:12px 12px 0 0 var(--shadow-deep)"></div><div class="tok">hover-card · 12 0 0</div></div>
  <div class="cell"><div class="box" style="box-shadow:12px 12px 0 5px var(--earth-bark), 12px 12px 0 0 var(--trail-moss)"></div><div class="tok">layered · bark + moss</div></div>
</div>
</body></html>
